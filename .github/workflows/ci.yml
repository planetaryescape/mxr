name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      docs: ${{ steps.filter.outputs.docs }}
      desktop: ${{ steps.filter.outputs.desktop }}
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          rust=false
          docs=false
          desktop=false
          expensive=false

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            rust=true
            docs=true
            desktop=true
            expensive=true
          else
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              base="${PR_BASE_SHA}"
              head="HEAD"
            else
              base="${BEFORE}"
              head="${SHA}"
            fi

            if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
              rust=true
              docs=true
              desktop=true
            else
              while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                case "${path}" in
                  Cargo.toml|Cargo.lock|deny.toml|rust-toolchain*|build.rs|crates/*|src/*|tests/*|benches/*|examples/*|.sqlx/*|scripts/test_quality_audit.sh)
                    rust=true
                    ;;
                  site/*)
                    docs=true
                    ;;
                  apps/desktop/*)
                    desktop=true
                    ;;
                esac
              done < <(git diff --name-only "${base}" "${head}")
            fi
          fi

          {
            echo "rust=${rust}"
            echo "docs=${docs}"
            echo "desktop=${desktop}"
            echo "expensive=${expensive}"
          } >> "${GITHUB_OUTPUT}"

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace

  test-quality-audit:
    name: Test Quality Audit (non-blocking)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - run: scripts/test_quality_audit.sh
      - uses: actions/upload-artifact@v7
        with:
          name: test-quality-audit
          path: target/test-quality

  test-quality-gate:
    name: Test Quality Gate (changed files)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: scripts/test_quality_audit.sh --strict --changed-only --base-ref origin/${{ github.base_ref }}

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: >
          cargo llvm-cov
          --package mxr
          --ignore-filename-regex 'crates/provider-gmail/src/(auth|client)\.rs|crates/provider-imap/src/session\.rs'
          --summary-only
          --fail-under-lines 90
          --fail-under-regions 75

  sqlx:
    name: SQLx Offline
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install sqlx-cli --no-default-features --features sqlite,rustls
      - run: cargo sqlx prepare --check --workspace

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.expensive == 'true'
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build

  desktop:
    name: Desktop Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.desktop == 'true' || needs.changes.outputs.expensive == 'true'
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: cargo build --release -p mxr
        working-directory: .
      - run: MXR_DESKTOP_BUNDLED_BINARY=../../target/release/mxr npm run package:dir
      - run: |
          BUNDLED_MXR=$(find out -type f \( -path '*resources/bin/mxr' -o -path '*Resources/bin/mxr' \) ! -path '*resources/app/*' ! -path '*Resources/app/*' -print -quit)
          test -n "$BUNDLED_MXR"
          "$BUNDLED_MXR" status --format json | grep '"protocol_version"'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release

  rustdoc:
    name: Rustdoc
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  install-check:
    name: Install Smoke Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --path . --locked --root "$RUNNER_TEMP/mxr-install"
      - run: |
          "$RUNNER_TEMP/mxr-install/bin/mxr" version
