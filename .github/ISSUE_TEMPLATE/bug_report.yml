name: Bug Report
description: Report a bug in mxr
labels: [bug]
body:
  - type: textarea
    id: report
    attributes:
      label: Bug Report
      description: |
        Paste the output of `mxr bug-report --stdout` below,
        or describe the issue manually.
      placeholder: |
        Run `mxr bug-report --stdout` and paste the output here,
        or describe the bug manually.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, additional logs, related issues, etc.
    validations:
      required: false
