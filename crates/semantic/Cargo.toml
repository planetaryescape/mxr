[package]
name = "mxr-semantic"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Internal: local embeddings and dense retrieval for mxr"
publish = false


[lints]
workspace = true

[features]
default = []
local = [
    "dep:calamine",
    "dep:fastembed",
    "dep:hnsw_rs",
    "dep:rayon",
    "dep:sha2",
    "dep:base16ct",
    "dep:undoc",
    "dep:unpdf",
]

[dependencies]
mxr-config = { workspace = true }
mxr-core = { workspace = true }
mxr-reader = { workspace = true }
mxr-store = { workspace = true }
anyhow = { workspace = true }
calamine = { version = "0.36", optional = true }
chrono = { workspace = true }
# <5.16: fastembed 5.16 pulls hf-hub 0.5, which fails to retrieve
# onnx/model.onnx for the bge/e5 profiles (semantic tests time out).
# Re-widen once fastembed/hf-hub fix model downloads.
fastembed = { version = ">=5.13, <5.18", optional = true }
hnsw_rs = { version = "0.3.4", optional = true }
rayon = { version = "1.10", optional = true }
sha2 = { version = "0.11", optional = true }
base16ct = { version = "1.0", features = ["alloc"], optional = true }
tokio = { workspace = true }
tracing = { workspace = true }
undoc = { version = "0.5", optional = true }
unpdf = { version = "0.9", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
zip = "8.6"
