[package]
name = "mxr-semantic"
version = "0.4.16"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Semantic indexing and dense retrieval for mxr."

[features]
default = []
local = [
    "dep:calamine",
    "dep:fastembed",
    "dep:hnsw_rs",
    "dep:sha2",
    "dep:tempfile",
    "dep:undoc",
    "dep:unpdf",
    "dep:which",
]

[dependencies]
mxr-core = { workspace = true }
mxr-config = { workspace = true }
mxr-reader = { workspace = true }
mxr-store = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
calamine = { version = "0.34", optional = true }
fastembed = { version = "5.13", optional = true }
hnsw_rs = { version = "0.3.4", optional = true }
sha2 = { version = "0.10", optional = true }
tempfile = { workspace = true, optional = true }
undoc = { version = "0.1", optional = true }
unpdf = { version = "0.2", optional = true }
which = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }
zip = "2.4"
