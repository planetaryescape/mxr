name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: linux-x86_64.tar.gz
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: macos-x86_64.tar.gz
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: macos-aarch64.tar.gz
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p mxr

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p mxr

      - name: Package
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="mxr-v${VERSION}-${{ matrix.archive }}"
          mkdir -p release
          cp target/${{ matrix.target }}/release/mxr release/
          cp LICENSE-MIT LICENSE-APACHE README.md release/
          cd release && tar czf "../${ARCHIVE}" * && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Generate SHA256 checksum
        run: shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  publish-crates:
    name: Publish Crates
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            echo "Publishing $1..."
            cargo publish -p "$1" --no-verify --allow-dirty 2>&1 || echo "::warning::Failed to publish $1 (may already exist)"
            sleep 15
          }
          publish mxr-async-imap
          publish mxr-core
          publish mxr-protocol
          publish mxr-config
          publish mxr-store
          publish mxr-search
          publish mxr-reader
          publish mxr-compose
          publish mxr-provider-fake
          publish mxr-provider-gmail
          publish mxr-provider-smtp
          publish mxr-provider-imap
          publish mxr-export
          publish mxr-rules
          publish mxr-sync
          publish mxr-tui
          publish mxr

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install git-cliff --locked

      - name: Generate changelog
        run: git cliff --tag "${GITHUB_REF_NAME}" --output CHANGELOG_RELEASE.md

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          files: artifacts/*
          generate_release_notes: false

  # Docs auto-deploy to Vercel on push (mxr-mail.vercel.app)

  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - uses: actions/checkout@v4
      - name: Update tap formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: mxr
          homebrew-tap: planetaryescape/homebrew-mxr
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mxr-${{ github.ref_name }}-macos-aarch64.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
