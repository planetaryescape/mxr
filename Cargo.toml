[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/config",
    "crates/store",
    "crates/search",
    "crates/semantic",
    "crates/test-support",
    "crates/protocol",
    "crates/provider-fake",
    "crates/provider-gmail",
    "crates/sync",
    "crates/daemon",
    "crates/tui",
    "crates/reader",
    "crates/compose",
    "crates/provider-smtp",
    "crates/provider-imap",
    "crates/export",
    "crates/rules",
    "examples/adapter-skeleton",
]

[workspace.package]
version = "0.4.6"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"
repository = "https://github.com/planetaryescape/mxr"
homepage = "https://github.com/planetaryescape/mxr"
keywords = ["email", "terminal", "tui", "imap", "gmail"]
categories = ["email", "command-line-utilities"]

[workspace.dependencies]
# Internal crates
mxr-core = { path = "crates/core", version = "0.4.6" }
mxr-store = { path = "crates/store", version = "0.4.6" }
mxr-search = { path = "crates/search", version = "0.4.6" }
mxr-semantic = { path = "crates/semantic", version = "0.4.6", default-features = false }
mxr-test-support = { path = "crates/test-support", version = "0.4.6" }
mxr-protocol = { path = "crates/protocol", version = "0.4.6" }
mxr-provider-fake = { path = "crates/provider-fake", version = "0.4.6" }
mxr-config = { path = "crates/config", version = "0.4.6" }
mxr-sync = { path = "crates/sync", version = "0.4.6" }
mxr-provider-gmail = { path = "crates/provider-gmail", version = "0.4.6" }
mxr-reader = { path = "crates/reader", version = "0.4.6" }
mxr-compose = { path = "crates/compose", version = "0.4.6" }
mxr-provider-smtp = { path = "crates/provider-smtp", version = "0.4.6" }
mxr-provider-imap = { path = "crates/provider-imap", version = "0.4.6" }
mxr-export = { path = "crates/export", version = "0.4.6" }
mxr-rules = { path = "crates/rules", version = "0.4.6" }
glob-match = "0.2"
which = "7"

# IMAP (fork with ENABLE/NAMESPACE support, published as mxr-async-imap)
async-imap = { package = "mxr-async-imap", path = "vendor/async-imap", version = "0.10.5" }
async-native-tls = "0.5"

# Async
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_bytes = "0.11"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "uuid", "chrono", "migrate"] }

# Search
tantivy = "0.22"

# TUI
ratatui = "0.29"
crossterm = "0.28"

# Types
uuid = { version = "1", features = ["v5", "v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
bitflags = { version = "2", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async traits
async-trait = "0.1"

# IPC framing
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1"

# CLI
clap = { version = "4", features = ["derive"] }
clap_complete = "4"

# Futures
futures = "0.3"

# Directories
dirs = "6"

# Config
toml = "0.8"

# Gmail/OAuth
yup-oauth2 = "11"
reqwest = { version = "0.12", features = ["json"] }
keyring = { version = "3", features = ["apple-native"] }
base64 = "0.22"
mail-parser = "0.9"
url = "2"

# TUI extras
nucleo = "0.5"
unicode-width = "0.2"

# Reader
html2text = "0.14"
regex = "1"
once_cell = "1"

# Compose
serde_yaml = "0.9"
comrak = { version = "0.31", default-features = false, features = ["shortcodes"] }

# SMTP
lettre = { version = "0.11", default-features = false, features = ["tokio1-rustls-tls", "builder", "hostname", "pool", "smtp-transport"] }

# Testing
tempfile = "3"
wiremock = "0.6"
pretty_assertions = "1"
insta = { version = "1", features = ["yaml"] }
assert_cmd = "2"
predicates = "3"
