# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = []
all-features = true

[advisories]
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # Transitive dependencies with no safe upgrade available.
    # These are pulled in by upstream crates we don't control.
    { id = "RUSTSEC-2023-0071", reason = "rsa is transitive through sqlx; mxr does not expose externally observable RSA operations and no patched upstream version is available yet" },
    { id = "RUSTSEC-2025-0052", reason = "async-std remains through mxr-async-imap/provider-imap; no async-imap-compatible upgrade path yet" },
    { id = "RUSTSEC-2026-0097", reason = "rand 0.9.2 advisory requires custom rand-using logger conditions that mxr does not install; upgrade when patched upstream" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    # Unicode data-files license; same family as Unicode-3.0 (finl_unicode via comrak).
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "NCSA",
    "zlib-acknowledgement",
    # BSD-style permissive license of libbz2 (libbz2-rs-sys via zip/calamine).
    "bzip2-1.0.6",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["GPL-2.0-only"], crate = "self_cell" },
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
skip-tree = [
    # fastembed currently brings the ONNX/tokenizers/hnsw_rs/hf-hub/calamine stack, which
    # pins older base64, darling, ureq, windows, and zip families alongside current app deps.
    { name = "fastembed", version = "5.13.0" },
    # hnsw_rs is also a direct semantic dependency; it still carries env_logger/anstream 0.x.
    { name = "hnsw_rs", version = "0.3.4" },
    # html2text and scraper intentionally coexist for text extraction vs DOM queries, but they
    # track different html5ever/markup5ever/match_token release lines.
    { name = "html2text", version = "0.14.4" },
    # undoc is the DOCX/PPTX extractor path and still pins older quick-xml/zip than calamine.
    { name = "undoc", version = "0.1.18" },
    # calamine's current spreadsheet reader stack uses zip 7.x while Swagger vendoring uses zip 3.x.
    { name = "calamine", version = "0.34.0" },
    # async-std is required by mxr-async-imap/provider-imap until the IMAP adapter stack
    # moves to a Tokio-native transport; it also brings async-channel/event-listener 1.x.
    { name = "async-std", version = "1.13.2" },
    # keyring 3.x still depends on security-framework 2.x/core-foundation 0.9 while our
    # TLS stack uses security-framework 3.x/core-foundation 0.10.
    { name = "keyring", version = "3.6.3" },
    # ratatui-image carries platform/image support crates with older rustix/windows lines
    # than the rest of the workspace's runtime and test stacks.
    { name = "ratatui-image", version = "10.0.6" },
    # tui-big-text still depends on derive_builder 0.20, which pins darling 0.20 while
    # current UI/rendering dependencies use darling 0.23.
    { name = "tui-big-text", version = "0.8.4" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# The async-imap fork is vendored as a path dependency, so no git source allow-list is needed.
allow-git = []
