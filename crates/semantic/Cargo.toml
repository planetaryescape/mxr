[package]
name = "mxr-semantic"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[lints]
workspace = true

[features]
default = []
local = [
    "dep:calamine",
    "dep:fastembed",
    "dep:hnsw_rs",
    "dep:sha2",
    "dep:undoc",
    "dep:unpdf",
]

[dependencies]
mxr-config = { workspace = true }
mxr-core = { workspace = true }
mxr-reader = { workspace = true }
mxr-store = { workspace = true }
anyhow = { workspace = true }
calamine = { version = "0.34", optional = true }
chrono = { workspace = true }
fastembed = { version = "5.13", optional = true }
hnsw_rs = { version = "0.3.4", optional = true }
sha2 = { version = "0.11", optional = true }
tokio = { workspace = true }
tracing = { workspace = true }
undoc = { version = "0.1", optional = true }
unpdf = { version = "0.2", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
zip = "7.2"
