[workspace]
resolver = "2"
members = [
    "crates/core",
    "crates/store",
    "crates/search",
    "crates/protocol",
    "crates/provider-fake",
    "crates/sync",
    "crates/daemon",
    "crates/tui",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.75"

[workspace.dependencies]
# Internal crates
mxr-core = { path = "crates/core" }
mxr-store = { path = "crates/store" }
mxr-search = { path = "crates/search" }
mxr-protocol = { path = "crates/protocol" }
mxr-provider-fake = { path = "crates/provider-fake" }
mxr-sync = { path = "crates/sync" }

# Async
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "uuid", "chrono", "migrate"] }

# Search
tantivy = "0.22"

# TUI
ratatui = "0.29"
crossterm = "0.28"

# Types
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
bitflags = { version = "2", features = ["serde"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Async traits
async-trait = "0.1"

# IPC framing
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1"

# CLI
clap = { version = "4", features = ["derive"] }

# Futures
futures = "0.3"

# Directories
dirs = "6"
