name: Release

on:
  push:
    tags:
      - "v*"
  # Manual trigger so a release can be re-run on its own tag when the initial
  # tag-push event was suppressed (e.g. release-please-action creates the tag
  # via the default GITHUB_TOKEN, which by design does not fire downstream
  # workflows). Pass the existing tag (e.g. `v0.4.55`) as the ref.
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  plan:
    name: Plan Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      cli_changed: ${{ steps.scope.outputs.cli_changed }}
      has_artifacts: ${{ steps.scope.outputs.has_artifacts }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: previous-tag
        name: Find previous tag
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${CURRENT_TAG}" | head -n1 || true)"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
      - id: scope
        name: Detect changed artifact families
        run: bash ./scripts/release_change_scope.sh "${{ steps.previous-tag.outputs.previous_tag }}" "${GITHUB_REF_NAME}"
      - id: matrix
        name: Build release matrix
        run: |
          # Release builds enable semantic-local; embedding model is fetched lazily
          # at runtime by `mxr semantic enable`. Intel mac artifacts are not built.
          MATRIX='{"include":[
            {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","platform_family":"linux","archive":"linux-x86_64.tar.gz","use_cross":false,"cargo_args":"--features semantic-local,web-ui"},
            {"os":"macos-15","target":"aarch64-apple-darwin","platform_family":"macos","archive":"macos-aarch64.tar.gz","use_cross":false,"cargo_args":"--features semantic-local,web-ui"}
          ]}'
          {
            echo 'build_matrix<<EOF'
            echo "${MATRIX}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  release-smoke:
    name: Release CLI Smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: plan
    env:
      MXR_GMAIL_TEST_CLIENT_ID: ${{ secrets.MXR_GMAIL_TEST_CLIENT_ID }}
      MXR_GMAIL_TEST_CLIENT_SECRET: ${{ secrets.MXR_GMAIL_TEST_CLIENT_SECRET }}
      MXR_GMAIL_TEST_REFRESH_TOKEN: ${{ secrets.MXR_GMAIL_TEST_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run release-blocking CLI tests
        if: needs.plan.outputs.cli_changed == 'true'
        run: cargo nextest run -p mxr --test cli_journey --test daemon_lifecycle --test reset_cli --test cli_help
      - name: Run deterministic provider smoke suite
        if: needs.plan.outputs.cli_changed == 'true'
        run: cargo test --workspace provider_offline_smoke_ -- --nocapture
      - name: Run live Gmail release smoke
        if: needs.plan.outputs.cli_changed == 'true'
        run: |
          if [ -z "$MXR_GMAIL_TEST_CLIENT_ID" ] \
            || [ -z "$MXR_GMAIL_TEST_CLIENT_SECRET" ] \
            || [ -z "$MXR_GMAIL_TEST_REFRESH_TOKEN" ]; then
            echo "::warning ::Missing MXR_GMAIL_TEST_{CLIENT_ID,CLIENT_SECRET,REFRESH_TOKEN}; skipping live provider smoke."
            exit 0
          fi
          cargo test -p mxr --test live_gmail_e2e -- --ignored --nocapture
      - name: Skip CLI smoke
        if: needs.plan.outputs.cli_changed != 'true'
        run: echo "CLI artifacts unchanged; skipping CLI smoke."

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: [plan]
    if: needs.plan.outputs.has_artifacts == 'true'
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: target
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build web SPA
        working-directory: apps/web
        run: npm ci && npm run build

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} -p mxr ${{ matrix.cargo_args }}
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }} -p mxr ${{ matrix.cargo_args }}
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}

      - name: SPA embedded in release binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          BINARY="./target/${MATRIX_TARGET}/release/mxr"
          "${BINARY}" daemon --foreground &
          DAEMON=$!
          WEB_URL="$RUNNER_TEMP/mxr-web-url.txt"
          trap 'kill "${WEB:-}" "${DAEMON}" || true' EXIT
          sleep 2
          "${BINARY}" web --no-open --print-url > "${WEB_URL}" &
          WEB=$!
          for _ in $(seq 1 20); do
            test -s "${WEB_URL}" && break
            sleep 1
          done
          URL=$(head -n1 "${WEB_URL}")
          test -n "${URL}"
          HTML=$(curl -fsSL "${URL}" || echo FAIL)
          echo "${HTML}" | grep -q 'spa-not-built' && { echo "FAIL: placeholder served"; exit 1; }
          echo "${HTML}" | grep -q '/assets/index-' || { echo "FAIL: no Vite-built bundle"; exit 1; }

      # macOS code signing happens BEFORE the archive so the signed binary
      # is what gets distributed. Both signing and notarization gracefully
      # no-op when their secrets are missing — the maintainer provisions
      # Apple Developer credentials once and re-runs.
      - name: Import Apple Developer ID certificate
        if: matrix.platform_family == 'macos'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERT_P12_BASE64" ]; then
            echo "::warning ::APPLE_CERT_P12_BASE64 secret not set; macOS binary will be unsigned (Gatekeeper will warn end users)."
            echo "APPLE_SIGN_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/codesign.keychain-db"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/cert.p12"
          echo "APPLE_SIGN_AVAILABLE=true" >> "$GITHUB_ENV"

      - name: Sign mxr binary (macOS)
        if: matrix.platform_family == 'macos' && env.APPLE_SIGN_AVAILABLE == 'true'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID" ]; then
            echo "::warning ::APPLE_DEVELOPER_ID secret not set; cannot sign without an identity name."
            exit 0
          fi
          BINARY="target/${MATRIX_TARGET}/release/mxr"
          codesign --force --options runtime --timestamp \
            --sign "$APPLE_DEVELOPER_ID" "$BINARY"
          codesign --verify --strict --verbose=2 "$BINARY"

      - name: Package CLI archive
        if: needs.plan.outputs.cli_changed == 'true'
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          MATRIX_ARCHIVE: ${{ matrix.archive }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="mxr-v${VERSION}-${MATRIX_ARCHIVE}"
          mkdir -p release
          cp "target/${MATRIX_TARGET}/release/mxr" release/
          cp LICENSE-MIT LICENSE-APACHE README.md release/
          cd release && tar czf "../${ARCHIVE}" ./* && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      # Notarization needs a .zip created with `ditto` (Apple-recognized
      # format). After the upload completes the archive is good — stapling
      # doesn't apply to bare CLI binaries (Apple validates online via
      # Gatekeeper). The macOS .tar.gz contains the same signed bytes.
      - name: Notarize macOS binary
        if: matrix.platform_family == 'macos' && env.APPLE_SIGN_AVAILABLE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          MATRIX_TARGET: ${{ matrix.target }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "::warning ::Notarization secrets not set; binary is signed but not notarized. End users will see a Gatekeeper warning on first run."
            exit 0
          fi
          NOTARIZE_ZIP="$RUNNER_TEMP/mxr-notarize.zip"
          ditto -c -k --keepParent "target/${MATRIX_TARGET}/release/mxr" "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          rm "$NOTARIZE_ZIP"

      - name: Generate CLI SHA256 checksum
        if: needs.plan.outputs.cli_changed == 'true'
        run: shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - uses: actions/upload-artifact@v7
        if: needs.plan.outputs.cli_changed == 'true'
        with:
          name: ${{ matrix.target }}-cli
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

  github-release:
    name: GitHub Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [plan, release-smoke, build-binaries]
    if: >-
      always()
      && needs.plan.result == 'success'
      && needs.release-smoke.result == 'success'
      && (needs.build-binaries.result == 'success'
        || (needs.plan.outputs.has_artifacts != 'true' && needs.build-binaries.result == 'skipped'))
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
          fallback: none

      - name: Generate changelog
        run: git cliff --tag "${GITHUB_REF_NAME}" --output CHANGELOG_RELEASE.md

      - uses: actions/download-artifact@v8
        if: needs.build-binaries.result == 'success'
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release artifact checksums
        if: needs.build-binaries.result == 'success'
        run: |
          cd artifacts
          sha256sum -c ./*.sha256

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'success'
        with:
          body_path: CHANGELOG_RELEASE.md
          files: artifacts/*
          generate_release_notes: false

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'skipped'
        with:
          body_path: CHANGELOG_RELEASE.md
          generate_release_notes: false

  # Docs auto-deploy to Vercel on push (mxr-mail.vercel.app)

  homebrew:
    name: Homebrew Formula
    runs-on: macos-15
    needs: [plan, github-release]
    if: needs.plan.outputs.cli_changed == 'true' && needs.github-release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Render formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash ./scripts/render_homebrew_formula.sh "$VERSION" artifacts Formula/mxr.rb
      - name: Update tap formula
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$COMMITTER_TOKEN" ]; then
            echo "::error ::HOMEBREW_TAP_TOKEN is required to update the Homebrew tap."
            exit 1
          fi
          VERSION="${GITHUB_REF#refs/tags/v}"
          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/planetaryescape/homebrew-mxr.git" tap
          cp Formula/mxr.rb tap/Formula/mxr.rb
          if git -C tap diff --quiet -- Formula/mxr.rb; then
            echo "No Homebrew formula changes"
            exit 0
          fi
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/mxr.rb
          git -C tap commit -m "mxr ${VERSION}"
          git -C tap push origin HEAD:main
      - name: Verify Homebrew install
        run: |
          brew update
          brew install planetaryescape/mxr/mxr
          mxr version
