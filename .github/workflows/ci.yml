name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  changes:
    name: Detect Changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      expensive: ${{ steps.filter.outputs.expensive }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          rust=false
          web=false
          docs=false
          expensive=false

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            rust=true
            web=true
            docs=true
            expensive=true
          else
            if [[ "${EVENT_NAME}" == "pull_request" ]]; then
              base="${PR_BASE_SHA}"
              head="HEAD"
            else
              base="${BEFORE}"
              head="${SHA}"
            fi

            if [[ -z "${base}" || "${base}" =~ ^0+$ ]]; then
              rust=true
              docs=true
            else
              while IFS= read -r path; do
                [[ -z "${path}" ]] && continue
                case "${path}" in
                  Cargo.toml|Cargo.lock|rust-toolchain*|build.rs|crates/*|src/*|.sqlx/*)
                    rust=true
                    ;;
                  deny.toml|tests/*|benches/*|examples/*|scripts/test_quality_audit.sh|scripts/test_quality_audit_test.sh|scripts/check_architecture_boundaries.sh)
                    rust=true
                    ;;
                  apps/web/*|apps/web/**|crates/web/*|crates/web/**|crates/protocol/*|crates/protocol/**)
                    web=true
                    ;;
                  site/*)
                    docs=true
                    ;;
                esac
              done < <(git diff --name-only "${base}" "${head}")
            fi
          fi

          {
            echo "rust=${rust}"
            echo "web=${web}"
            echo "docs=${docs}"
            echo "expensive=${expensive}"
          } >> "${GITHUB_OUTPUT}"

  deny:
    name: cargo deny
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  secret-scan:
    name: Secret Scan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan checked-in files
        run: |
          set -euo pipefail
          scan_dir="${RUNNER_TEMP}/gitleaks-tree"
          mkdir -p "${scan_dir}"
          git ls-files -z | tar --null -T - -cf - | tar -x -C "${scan_dir}"
          gitleaks dir "${scan_dir}" --redact=20 --verbose --max-target-megabytes=2
      - name: Scan git history
        run: gitleaks git . --redact=20 --verbose

  check:
    name: Check
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo check --workspace --all-targets

  architecture:
    name: Architecture Boundaries
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - run: scripts/check_architecture_boundaries.sh

  release-gates:
    name: Release Gate Scripts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/release_version_gate_test.sh
      - run: bash scripts/release_gmail_oauth_gate_test.sh
      - run: bash scripts/provider_smoke_workflow_test.sh
      - run: bash scripts/ci_workflow_test.sh

  fmt:
    name: Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: Test (fast / no semantic)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo nextest run --workspace

  test-semantic:
    name: Test (semantic-local)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo nextest run --workspace --features semantic-local

  test-quality-audit:
    name: Test Quality Audit (non-blocking)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.expensive == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - run: scripts/test_quality_audit_test.sh
      - run: scripts/test_quality_audit.sh
      - uses: actions/upload-artifact@v7
        with:
          name: test-quality-audit
          path: target/test-quality

  test-quality-gate:
    name: Test Quality Gate (changed files)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.rust == 'true' || needs.changes.outputs.web == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: scripts/test_quality_audit_test.sh
      - run: scripts/test_quality_audit.sh --strict --changed-only --base-ref origin/${{ github.base_ref }}

  web-tests:
    name: Web Unit Tests
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.expensive == 'true'
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  web-e2e-smoke:
    name: Web E2E Smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.expensive == 'true'
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build mxr for the Playwright daemon
        working-directory: ${{ github.workspace }}
        run: |
          cargo build -p mxr
          echo "MXR_E2E_BIN=${GITHUB_WORKSPACE}/target-cli/debug/mxr" >> "$GITHUB_ENV"
      - run: npm run e2e -- e2e/smoke.spec.ts

  coverage:
    name: Coverage
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: >
          cargo llvm-cov
          --package mxr
          --features semantic-local
          --ignore-filename-regex 'crates/provider-gmail/src/(auth|client)\.rs|crates/provider-imap/src/session\.rs'
          --summary-only
          --fail-under-lines 90
          --fail-under-regions 75

  sqlx:
    name: SQLx Offline
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features sqlite,rustls
      - run: |
          db_path="${RUNNER_TEMP}/mxr-sqlx-check.db"
          rm -f "$db_path"
          cargo run -p mxr-store --example create_db -- "$db_path"
          DATABASE_URL="sqlite:${db_path}" cargo sqlx prepare --check --workspace

  docs:
    name: Docs Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.expensive == 'true'
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run build

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    strategy:
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo build --workspace --release

  rustdoc:
    name: Rustdoc
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    env:
      RUSTDOCFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo doc --workspace --no-deps

  msrv:
    name: MSRV (1.88)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo check --workspace --locked

  install-check:
    name: Install Smoke Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: changes
    if: needs.changes.outputs.expensive == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - run: cargo install --path . --locked --root "$RUNNER_TEMP/mxr-install"
      - run: |
          "$RUNNER_TEMP/mxr-install/bin/mxr" version
          test -x "$RUNNER_TEMP/mxr-install/bin/mxr-chime-player"
