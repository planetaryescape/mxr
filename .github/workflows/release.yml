name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      cli_changed: ${{ steps.scope.outputs.cli_changed }}
      desktop_source_changed: ${{ steps.scope.outputs.desktop_source_changed }}
      desktop_changed: ${{ steps.scope.outputs.desktop_changed }}
      has_artifacts: ${{ steps.scope.outputs.has_artifacts }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: previous-tag
        name: Find previous tag
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-version:refname | grep '^v' | grep -Fxv "${CURRENT_TAG}" | head -n1 || true)"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
      - id: scope
        name: Detect changed artifact families
        run: bash ./scripts/release_change_scope.sh "${{ steps.previous-tag.outputs.previous_tag }}" "${GITHUB_REF_NAME}"
      - id: matrix
        name: Build release matrix
        run: |
          MATRIX='{"include":[
            {"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","platform_family":"linux","archive":"linux-x86_64.tar.gz","desktop_platform":"linux","desktop_arch":"x64","desktop_archive":"desktop-linux-x86_64.zip","use_cross":false,"cargo_args":""},
            {"os":"macos-15-intel","target":"x86_64-apple-darwin","platform_family":"macos","archive":"macos-x86_64.tar.gz","desktop_platform":"darwin","desktop_arch":"x64","desktop_archive":"desktop-macos-x86_64.zip","use_cross":false,"cargo_args":"--no-default-features"},
            {"os":"macos-15","target":"aarch64-apple-darwin","platform_family":"macos","archive":"macos-aarch64.tar.gz","desktop_platform":"darwin","desktop_arch":"arm64","desktop_archive":"desktop-macos-aarch64.zip","use_cross":false,"cargo_args":""}
          ]}'
          {
            echo 'build_matrix<<EOF'
            echo "${MATRIX}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Build ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.has_artifacts == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v6
        if: needs.plan.outputs.desktop_source_changed == 'true'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }} -p mxr ${{ matrix.cargo_args }}
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }} -p mxr ${{ matrix.cargo_args }}
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}

      - name: Package CLI archive
        if: needs.plan.outputs.cli_changed == 'true'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="mxr-v${VERSION}-${{ matrix.archive }}"
          mkdir -p release
          cp "target/${{ matrix.target }}/release/mxr" release/
          cp LICENSE-MIT LICENSE-APACHE README.md release/
          cd release && tar czf "../${ARCHIVE}" ./* && cd ..
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate CLI SHA256 checksum
        if: needs.plan.outputs.cli_changed == 'true'
        run: shasum -a 256 "${{ env.ARCHIVE }}" > "${{ env.ARCHIVE }}.sha256"

      - name: Install desktop dependencies
        if: needs.plan.outputs.desktop_source_changed == 'true'
        working-directory: apps/desktop
        run: npm ci

      - name: Package desktop
        if: needs.plan.outputs.desktop_source_changed == 'true'
        working-directory: apps/desktop
        env:
          MXR_DESKTOP_BUNDLED_BINARY: ../../target/${{ matrix.target }}/release/mxr
        run: npm run make -- --platform=${{ matrix.desktop_platform }} --arch=${{ matrix.desktop_arch }}

      - name: Smoke packaged desktop bundle
        if: needs.plan.outputs.desktop_source_changed == 'true'
        working-directory: apps/desktop
        run: |
          BUNDLED_MXR=$(find out -type f \( -path '*resources/bin/mxr' -o -path '*Resources/bin/mxr' \) ! -path '*resources/app/*' ! -path '*Resources/app/*' -print -quit)
          test -n "$BUNDLED_MXR"
          "$BUNDLED_MXR" status --format json | grep '"protocol_version"'

      - name: Collect desktop archive
        if: needs.plan.outputs.desktop_source_changed == 'true'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DESKTOP_ARCHIVE="mxr-v${VERSION}-${{ matrix.desktop_archive }}"
          DESKTOP_ZIP=$(find apps/desktop/out/make -name '*.zip' -print -quit)
          test -n "${DESKTOP_ZIP}"
          cp "${DESKTOP_ZIP}" "${DESKTOP_ARCHIVE}"
          echo "DESKTOP_ARCHIVE=${DESKTOP_ARCHIVE}" >> "$GITHUB_ENV"

      - name: Generate desktop SHA256 checksum
        if: needs.plan.outputs.desktop_source_changed == 'true'
        run: shasum -a 256 "${{ env.DESKTOP_ARCHIVE }}" > "${{ env.DESKTOP_ARCHIVE }}.sha256"

      - uses: actions/upload-artifact@v7
        if: needs.plan.outputs.cli_changed == 'true'
        with:
          name: ${{ matrix.target }}-cli
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - uses: actions/upload-artifact@v7
        if: needs.plan.outputs.desktop_source_changed == 'true'
        with:
          name: ${{ matrix.target }}-desktop
          path: |
            ${{ env.DESKTOP_ARCHIVE }}
            ${{ env.DESKTOP_ARCHIVE }}.sha256

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [plan, build-binaries]
    if: always() && needs.plan.result == 'success' && (needs.build-binaries.result == 'success' || needs.build-binaries.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install git-cliff --locked

      - name: Generate changelog
        run: git cliff --tag "${GITHUB_REF_NAME}" --output CHANGELOG_RELEASE.md

      - uses: actions/download-artifact@v8
        if: needs.build-binaries.result == 'success'
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'success'
        with:
          body_path: CHANGELOG_RELEASE.md
          files: artifacts/*
          generate_release_notes: false

      - uses: softprops/action-gh-release@v3.0.0
        if: needs.build-binaries.result == 'skipped'
        with:
          body_path: CHANGELOG_RELEASE.md
          generate_release_notes: false

  # Docs auto-deploy to Vercel on push (mxr-mail.vercel.app)

  crates-io:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [plan, github-release]
    if: needs.plan.outputs.cli_changed == 'true' && needs.github-release.result == 'success'
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish workspace crates in dependency order
        run: |
          # Publish leaf crates first, then dependents, then the root binary.
          # `--no-verify` skips a full build (the binary was already built and
          # tested in earlier jobs). Tolerate `crate version already exists`
          # so partial-release re-runs are idempotent.
          publish() {
            local crate="$1"
            echo "::group::publish $crate"
            if ! cargo publish -p "$crate" --no-verify; then
              # Inspect the manifest version against crates.io to decide if
              # the failure is "already published" (idempotent) or fatal.
              local local_version
              local_version=$(cargo metadata --no-deps --format-version 1 \
                | python3 -c "import sys, json; m=json.load(sys.stdin); [print(p['version']) for p in m['packages'] if p['name']=='$crate']")
              local published
              published=$(curl -fsSL "https://crates.io/api/v1/crates/$crate/$local_version" \
                | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('version', {}).get('num', ''))" \
                || echo "")
              if [ "$published" = "$local_version" ]; then
                echo "$crate@$local_version already published; idempotent skip"
              else
                echo "publish $crate@$local_version failed and not present on crates.io"
                exit 1
              fi
            fi
            sleep 30
            echo "::endgroup::"
          }
          publish mxr-core
          publish mxr-keychain
          publish mxr-config
          publish mxr-mail-parse
          publish mxr-outbound
          publish mxr-protocol
          publish mxr-reader
          publish mxr-rules
          publish mxr-search
          publish mxr-semantic
          publish mxr-store
          publish mxr-test-support
          publish mxr-export
          publish mxr-compose
          publish mxr-provider-fake
          publish mxr-provider-gmail
          publish mxr-provider-imap
          publish mxr-provider-smtp
          publish mxr-sync
          publish mxr-tui
          publish mxr-web
          publish mxr

  homebrew:
    name: Homebrew Formula
    runs-on: ubuntu-latest
    needs: [plan, github-release]
    if: needs.plan.outputs.cli_changed == 'true' && needs.github-release.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Render formula
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          bash ./scripts/render_homebrew_formula.sh "$VERSION" artifacts Formula/mxr.rb
      - name: Update tap formula
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/planetaryescape/homebrew-mxr.git" tap
          cp Formula/mxr.rb tap/Formula/mxr.rb
          if git -C tap diff --quiet -- Formula/mxr.rb; then
            echo "No Homebrew formula changes"
            exit 0
          fi
          git -C tap config user.name "github-actions[bot]"
          git -C tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C tap add Formula/mxr.rb
          git -C tap commit -m "mxr ${VERSION}"
          git -C tap push origin HEAD:main
