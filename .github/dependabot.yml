version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      all-deps:
        patterns: ["*"]
        # Automate approves non-major updates only; keep this group aligned.
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    ignore:
      - dependency-name: "axios"
        versions: ["1.14.1", "0.30.4"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: "dtolnay/rust-toolchain"
