<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    .box { rx: 8; ry: 8; stroke-width: 1.5; }
    .client-box { fill: #1e1e3a; stroke: #6c63ff; }
    .daemon-box { fill: #1a1a2e; stroke: #6c63ff; stroke-width: 2; }
    .store-box { fill: #1e2a1e; stroke: #4ade80; }
    .provider-box { fill: #2a1e1e; stroke: #f87171; }
    .label { font-family: 'Inter', system-ui, sans-serif; fill: #e0e0e0; font-size: 13px; font-weight: 600; }
    .sublabel { font-family: 'Inter', system-ui, sans-serif; fill: #9ca3af; font-size: 11px; }
    .arrow { stroke: #6c63ff; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-store { stroke: #4ade80; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-green); }
    .arrow-provider { stroke: #f87171; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-red); }
    .section-label { font-family: 'Inter', system-ui, sans-serif; fill: #6b7280; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6c63ff"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#0d0d1a" rx="12"/>

  <!-- Section labels -->
  <text x="80" y="30" class="section-label">Clients</text>
  <text x="330" y="30" class="section-label">Engine</text>
  <text x="540" y="30" class="section-label">Storage</text>
  <text x="700" y="30" class="section-label">Providers</text>

  <!-- Clients -->
  <rect x="30" y="50" width="140" height="50" class="box client-box"/>
  <text x="100" y="72" class="label" text-anchor="middle">TUI</text>
  <text x="100" y="88" class="sublabel" text-anchor="middle">Ratatui thin client</text>

  <rect x="30" y="120" width="140" height="50" class="box client-box"/>
  <text x="100" y="142" class="label" text-anchor="middle">CLI</text>
  <text x="100" y="158" class="sublabel" text-anchor="middle">Full command surface</text>

  <rect x="30" y="190" width="140" height="50" class="box client-box"/>
  <text x="100" y="212" class="label" text-anchor="middle">AI Agent</text>
  <text x="100" y="228" class="sublabel" text-anchor="middle">via CLI + JSON output</text>

  <rect x="30" y="260" width="140" height="50" class="box client-box"/>
  <text x="100" y="282" class="label" text-anchor="middle">Scripts</text>
  <text x="100" y="298" class="sublabel" text-anchor="middle">Shell hooks, cron</text>

  <rect x="30" y="330" width="140" height="50" class="box client-box"/>
  <text x="100" y="352" class="label" text-anchor="middle">Your Client</text>
  <text x="100" y="368" class="sublabel" text-anchor="middle">JSON over Unix socket</text>

  <!-- Unix Socket label -->
  <text x="215" y="200" class="sublabel" text-anchor="middle" transform="rotate(-90, 215, 200)">Unix Socket (JSON)</text>

  <!-- Daemon -->
  <rect x="260" y="50" width="200" height="340" class="box daemon-box"/>
  <text x="360" y="78" class="label" text-anchor="middle">Daemon</text>

  <rect x="280" y="95" width="160" height="36" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="118" class="sublabel" text-anchor="middle">Sync Engine</text>

  <rect x="280" y="145" width="160" height="36" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="168" class="sublabel" text-anchor="middle">Rules Engine</text>

  <rect x="280" y="195" width="160" height="36" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="218" class="sublabel" text-anchor="middle">Compose / Reader</text>

  <rect x="280" y="245" width="160" height="36" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="268" class="sublabel" text-anchor="middle">Snooze / Scheduler</text>

  <rect x="280" y="295" width="160" height="36" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="318" class="sublabel" text-anchor="middle">IPC Server</text>

  <rect x="280" y="345" width="160" height="30" class="box" style="fill:#252540;stroke:#4b4b7a"/>
  <text x="360" y="365" class="sublabel" text-anchor="middle">Export / Observability</text>

  <!-- Storage -->
  <rect x="520" y="80" width="130" height="60" class="box store-box"/>
  <text x="585" y="107" class="label" text-anchor="middle">SQLite</text>
  <text x="585" y="125" class="sublabel" text-anchor="middle">Canonical store</text>

  <rect x="520" y="170" width="130" height="60" class="box store-box"/>
  <text x="585" y="197" class="label" text-anchor="middle">Tantivy</text>
  <text x="585" y="215" class="sublabel" text-anchor="middle">Search index</text>

  <!-- Providers -->
  <rect x="670" y="80" width="110" height="45" class="box provider-box"/>
  <text x="725" y="107" class="label" text-anchor="middle">Gmail</text>

  <rect x="670" y="145" width="110" height="45" class="box provider-box"/>
  <text x="725" y="172" class="label" text-anchor="middle">IMAP</text>

  <rect x="670" y="210" width="110" height="45" class="box provider-box"/>
  <text x="725" y="237" class="label" text-anchor="middle">SMTP</text>

  <rect x="670" y="290" width="110" height="45" class="box provider-box"/>
  <text x="725" y="312" class="label" text-anchor="middle">Your Adapter</text>
  <text x="725" y="327" class="sublabel" text-anchor="middle">Rust trait</text>

  <!-- Arrows: Clients to Daemon -->
  <path d="M170,75 L258,190" class="arrow"/>
  <path d="M170,145 L258,200" class="arrow"/>
  <path d="M170,215 L258,210" class="arrow"/>
  <path d="M170,285 L258,220" class="arrow"/>
  <path d="M170,355 L258,310" class="arrow"/>

  <!-- Arrows: Daemon to Storage -->
  <path d="M462,113 L518,110" class="arrow-store"/>
  <path d="M462,200 L518,200" class="arrow-store"/>

  <!-- Arrows: Daemon to Providers -->
  <path d="M462,113 L668,102" class="arrow-provider"/>
  <path d="M462,113 L668,167" class="arrow-provider"/>
  <path d="M462,218 L668,232" class="arrow-provider"/>
  <path d="M462,268 L668,312" class="arrow-provider" stroke-dasharray="6,4"/>
</svg>
