name: Provider Offline Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  provider-offline-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run deterministic provider smoke suite
        run: cargo test --workspace provider_offline_smoke_ -- --nocapture
